name: PR Review
env:
  ANTHROPIC_BASE_URL: https://coding.dashscope.aliyuncs.com/apps/anthropic
on:
  pull_request:
    types: [opened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Get PR Diff
        id: diff
        run: |
          # 确保拉取远程所有分支
          git fetch origin --force

          # 👇 使用两个点号 (git diff A B)，直接比较版本，不依赖 merge base，绝对不会报错
          git diff origin/${{ github.base_ref }} origin/${{ github.head_ref }} > pr_diff.txt || true

          # 校验 Diff 是否为空
          if [ ! -s pr_diff.txt ]; then
            echo "PR 无代码变更，跳过审查"
            echo "diff_size=0" >> $GITHUB_OUTPUT
          else
            echo "diff_size=$(wc -l < pr_diff.txt)" >> $GITHUB_OUTPUT
            # 打印 Diff 到日志，确认有内容
            cat pr_diff.txt
          fi
      - name: PR Review with Progress Tracking
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          prompt: " 你是资深代码评审专家，需要完成以下任务：
            1. 先执行命令：gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }}
            2. 分析PR中的代码变更，重点检查：
               - 语法错误、逻辑漏洞、性能问题
               - 代码规范（命名、注释、格式）
               - 潜在Bug和安全风险
            3. 对每处问题生成**内联评论**，格式必须严格遵循：
               - 位置：指定文件路径（如 index.html）+ 行号（如 45）
               - 标题：简短的问题类型（如 [性能问题]、[语法错误]）
               - 描述：清晰说明问题（1-2句话）
               - 建议：给出可直接复制的修复代码块
            4. 通过 `mcp__github_inline_comment__create_inline_comment` 工具，将每个问题提交到PR对应代码行，参数要求：
               - path: 问题文件路径
               - line: 问题行号
               - body: 评论内容（包含标题、描述、修复建议，用Markdown格式化）
            5. 最后在PR根评论区生成一份汇总报告，列出所有问题的文件+行号+简要描述。"
          claude_args: |
            --allowed-tools "mcp__github_inline_comment__create_inline_comment,bash(gh *)"
            --model "qwen3.5-plus"

      - name: Print Claude Report
        run: |
          # 强制输出报告文件内容到日志
          REPORT_FILE="/home/runner/work/_temp/claude-execution-output.json"
          if [ -f "$REPORT_FILE" ]; then
            echo "===== Claude 完整审查报告 ====="
            cat "$REPORT_FILE" | jq .  # 格式化JSON，更易读
          else
            echo "⚠️  Claude 报告文件未生成，请检查API密钥和模型配置"
          fi
